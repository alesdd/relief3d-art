<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title lang-ua>Каталог — Relief3D</title>
    <meta name="description" content="Каталог 3D настінних панно. 3D wall art catalog.">
    
    <link rel="canonical" href="https://relief3d.cc/catalog/">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://relief3d.cc/catalog/">
    <meta property="og:title" content="Каталог 3D Панно — Relief3D">
    <meta property="og:description" content="Повний каталог наших робіт. Ексклюзивні 3D настінні панно.">
    <meta property="og:image" content="https://relief3d.cc/assets/images/kharkiv_shield_concept.png">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://relief3d.cc/catalog/">
    <meta property="twitter:title" content="Каталог 3D Панно — Relief3D">
    <meta property="twitter:description" content="Повний каталог наших робіт. Ексклюзивні 3D настінні панно.">
    <meta property="twitter:image" content="https://relief3d.cc/assets/images/kharkiv_shield_concept.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/shared.css">
</head>
<body>
    <div class="ambient-glow"></div>
    <header class="site-header" id="site-header"></header>

    <div class="page-content">
        <section style="padding: 4rem 5% 2rem;">
            <div class="breadcrumbs">
                <a href="../index.html" class="lang-ua">Головна</a>
                <a href="../index.html" class="lang-en">Home</a>
                <span class="sep">›</span>
                <span class="lang-ua">Каталог</span>
                <span class="lang-en">Catalog</span>
            </div>
            <h1 style="font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 900; letter-spacing: -0.03em; margin-bottom: 0.5rem;">
                <span class="lang-ua">Каталог</span>
                <span class="lang-en">Catalog</span>
            </h1>
            <p style="color: var(--text-secondary); font-size: 1rem; margin-bottom: 2rem;">
                <span class="lang-ua">Усі роботи</span>
                <span class="lang-en">All works</span>
            </p>
        </section>

        <!-- Filter Bar -->
        <div class="filter-bar" id="filter-bar">
            <button class="filter-btn active" data-cat="" onclick="applyFilter(this)">
                <span class="lang-ua">Усі</span><span class="lang-en">All</span>
            </button>
            <button class="filter-btn" data-cat="heraldry" onclick="applyFilter(this)">
                🏛️ <span class="lang-ua">Геральдика</span><span class="lang-en">Heraldry</span>
            </button>
            <button class="filter-btn" data-cat="animals" onclick="applyFilter(this)">
                🐱 <span class="lang-ua">Тварини</span><span class="lang-en">Animals</span>
            </button>
            <button class="filter-btn" data-cat="japan" onclick="applyFilter(this)">
                ⛩️ <span class="lang-ua">Японія</span><span class="lang-en">Japan</span>
            </button>
            <button class="filter-btn" data-cat="gaming" onclick="applyFilter(this)">
                🎮 <span class="lang-ua">Геймінг</span><span class="lang-en">Gaming</span>
            </button>
        </div>

        <div class="portfolio-grid" id="catalog-grid"></div>
    </div>

    <footer class="site-footer">
        <div class="lang-switcher">
            <button class="lang-btn" data-lang="ua" onclick="setLanguage('ua')">UA</button>
            <button class="lang-btn" data-lang="en" onclick="setLanguage('en')">EN</button>
        </div>
        <p>&copy; 2026 Relief3D.Art.</p>
    </footer>

    <script src="../assets/js/catalog.js?v=3.0"></script>
    <script src="../assets/js/site.js?v=3.0"></script>
    <script>
        buildHeader('catalog');

        function applyFilter(btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderCatalog('catalog-grid', btn.dataset.cat || null, getLang());
            applyLanguage(getLang());
        }

        renderCatalog('catalog-grid', null, getLang());
    </script>
</body>
</html>
