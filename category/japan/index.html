<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Японські мотиви — Relief3D</title>
    <meta name="description" content="Японські мотиви у 3D. Japanese art 3D wall panels.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/shared.css">
</head>
<body>
    <div class="ambient-glow"></div>
    <header class="site-header" id="site-header"></header>

    <div class="page-content">
        <section style="padding: 4rem 5% 2rem;">
            <div class="breadcrumbs">
                <a href="../../index.html" class="lang-ua">Головна</a>
                <a href="../../index.html" class="lang-en">Home</a>
                <span class="sep">›</span>
                <a href="../../catalog/index.html" class="lang-ua">Каталог</a>
                <a href="../../catalog/index.html" class="lang-en">Catalog</a>
                <span class="sep">›</span>
                <span class="lang-ua">Японія</span>
                <span class="lang-en">Japanese Art</span>
            </div>
            <div style="font-size: 3rem; margin-bottom: 0.75rem;">⛩️</div>
            <h1 style="font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 900; letter-spacing: -0.03em; margin-bottom: 0.75rem;">
                <span class="lang-ua">Японські мотиви</span>
                <span class="lang-en">Japanese Art</span>
            </h1>
            <p style="color: var(--text-secondary); font-size: 1rem; max-width: 600px; margin-bottom: 2rem; line-height: 1.7;">
                <span class="lang-ua">Самураї, дракони, сакура, маски Оні та японська естетика у вражаючому об'ємному рельєфі.</span>
                <span class="lang-en">Samurai, dragons, cherry blossoms, Oni masks, and Japanese aesthetics in stunning volumetric relief.</span>
            </p>
        </section>

        <div class="portfolio-grid" id="portfolio" data-category="japan"></div>
    </div>

    <footer class="site-footer">
        <div class="lang-switcher">
            <button class="lang-btn" data-lang="ua" onclick="setLanguage('ua')">UA</button>
            <button class="lang-btn" data-lang="en" onclick="setLanguage('en')">EN</button>
        </div>
        <p>&copy; 2026 Relief3D.Art.</p>
    </footer>

    <script src="../../assets/js/catalog.js"></script>
    <script src="../../assets/js/site.js"></script>
    <script>
        buildHeader('catalog');
        document.getElementById('portfolio').addEventListener('mousemove', e => {
            for (const card of document.getElementsByClassName('card')) {
                const rect = card.getBoundingClientRect();
                card.style.setProperty('--mouse-x', `${e.clientX - rect.left}px`);
                card.style.setProperty('--mouse-y', `${e.clientY - rect.top}px`);
            }
        });
        renderCatalog('portfolio', 'japan', getLang());
    </script>
</body>
</html>
